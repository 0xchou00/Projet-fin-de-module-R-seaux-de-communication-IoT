<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-label="Architecture Smart Home DHT22 avec Wokwi, EMQX Cloud, MQTT TLS et dashboard securise">
  <defs>
    <style>
      .bg { fill: #f5f8fc; }
      .title { fill: #10203a; font: 800 38px Arial, sans-serif; }
      .subtitle { fill: #50617a; font: 400 22px Arial, sans-serif; }
      .section { fill: #ffffff; stroke: #d7e0ec; stroke-width: 2; rx: 18; }
      .node { fill: #ffffff; stroke: #98aac2; stroke-width: 2; rx: 16; }
      .node-blue { fill: #edf4ff; stroke: #2563eb; stroke-width: 3; rx: 16; }
      .node-green { fill: #ecfdf3; stroke: #159947; stroke-width: 3; rx: 16; }
      .node-amber { fill: #fff7ed; stroke: #c76b12; stroke-width: 3; rx: 16; }
      .node-violet { fill: #f4f0ff; stroke: #7c3aed; stroke-width: 3; rx: 16; }
      .label { fill: #12213a; font: 800 25px Arial, sans-serif; }
      .small { fill: #4f6078; font: 400 18px Arial, sans-serif; }
      .tiny { fill: #617089; font: 400 15px Arial, sans-serif; }
      .tag { fill: #ffffff; stroke: #d4deea; stroke-width: 1.5; rx: 16; }
      .tagtext { fill: #1f3860; font: 700 15px Arial, sans-serif; }
      .arrow { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .arrow-green { stroke: #159947; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .arrow-gray { stroke: #7b8798; stroke-width: 3; fill: none; marker-end: url(#arrow-gray); stroke-dasharray: 9 8; }
      .note { fill: #eaf2ff; stroke: #b8cff3; rx: 12; }
      .noteText { fill: #16335f; font: 700 18px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#159947"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8798"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <text x="60" y="74" class="title">Architecture du projet Smart Home DHT22</text>
  <text x="60" y="112" class="subtitle">Surveillance temperature/humidite avec ESP32 Wokwi, EMQX Cloud, MQTT/TLS et dashboard securise</text>

  <rect x="50" y="155" width="360" height="690" class="section"/>
  <text x="80" y="198" class="label">Simulation IoT</text>
  <text x="80" y="226" class="small">Capteur et microcontroleur</text>

  <rect x="90" y="275" width="280" height="145" class="node-blue"/>
  <text x="122" y="322" class="label">Wokwi</text>
  <text x="122" y="354" class="small">ESP32 + DHT22</text>
  <text x="122" y="382" class="tiny">Lecture temperature et humidite</text>

  <rect x="90" y="470" width="280" height="145" class="node"/>
  <text x="122" y="517" class="label">Code embarque</text>
  <text x="122" y="549" class="small">Topic telemetry</text>
  <text x="122" y="577" class="tiny">smart-home/dht22/telemetry</text>

  <rect x="90" y="665" width="280" height="105" class="node-green"/>
  <text x="122" y="708" class="label">Wi-Fi Wokwi</text>
  <text x="122" y="739" class="small">Wokwi-GUEST</text>

  <rect x="500" y="155" width="410" height="690" class="section"/>
  <text x="530" y="198" class="label">Cloud MQTT</text>
  <text x="530" y="226" class="small">Broker EMQX Cloud</text>

  <rect x="555" y="300" width="300" height="165" class="node-green"/>
  <text x="590" y="346" class="label">EMQX Cloud</text>
  <text x="590" y="378" class="small">na7a271a...emqxsl.com</text>
  <text x="590" y="407" class="tiny">Port 8883 - MQTT over TLS</text>
  <text x="590" y="435" class="tiny">Access Control: dht22</text>

  <rect x="555" y="545" width="300" height="145" class="node"/>
  <text x="590" y="590" class="label">Messages JSON</text>
  <text x="590" y="622" class="small">temperature, humidity</text>
  <text x="590" y="650" class="tiny">status LOW / NORMAL / HIGH</text>

  <rect x="1010" y="155" width="540" height="690" class="section"/>
  <text x="1040" y="198" class="label">Application securisee</text>
  <text x="1040" y="226" class="small">Backend + interface dashboard</text>

  <rect x="1060" y="285" width="430" height="150" class="node-violet"/>
  <text x="1095" y="330" class="label">Backend Node.js</text>
  <text x="1095" y="362" class="small">Client MQTT/TLS cote serveur</text>
  <text x="1095" y="390" class="tiny">Secrets EMQX non exposes au navigateur</text>

  <rect x="1060" y="490" width="430" height="140" class="node-amber"/>
  <text x="1095" y="533" class="label">Authentification forte</text>
  <text x="1095" y="565" class="small">Mot de passe + TOTP</text>
  <text x="1095" y="593" class="tiny">Session HttpOnly, CSRF, rate limit</text>

  <rect x="1060" y="685" width="430" height="130" class="node-blue"/>
  <text x="1095" y="727" class="label">Dashboard temps reel</text>
  <text x="1095" y="759" class="small">PC, telephone, lien public</text>
  <text x="1095" y="787" class="tiny">SSE avec fallback polling leger</text>

  <path d="M370 350 C455 350 470 382 555 382" class="arrow-green"/>
  <path d="M855 382 C940 382 965 360 1060 360" class="arrow"/>
  <path d="M1275 435 L1275 490" class="arrow-gray"/>
  <path d="M1275 630 L1275 685" class="arrow-gray"/>

  <rect x="420" y="330" width="150" height="42" class="tag"/>
  <text x="443" y="357" class="tagtext">MQTT/TLS 8883</text>

  <rect x="905" y="330" width="150" height="42" class="tag"/>
  <text x="932" y="357" class="tagtext">Subscribe</text>

  <rect x="445" y="735" width="500" height="70" class="note"/>
  <text x="475" y="765" class="noteText">Flux: DHT22 -> Wokwi -> EMQX -> Backend -> Dashboard</text>
  <text x="475" y="790" class="tiny">TLS protege MQTT. MFA protege l'acces utilisateur.</text>
</svg>
